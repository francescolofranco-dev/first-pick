name: Release

# Builds an UNSIGNED macOS .dmg for both Apple Silicon (arm64) and Intel (x86_64)
# when a vX.Y.Z tag is pushed, then publishes them to a GitHub Release.
#
# Both architectures build on Apple Silicon runners (macos-14): arm64 natively, and
# x86_64 via an Intel JDK under Rosetta (jpackage bundles a runtime matching the JDK
# arch, so pointing `composeJdk` at the Intel JDK yields an Intel app). This avoids
# the scarce/deprecated Intel `macos-13` runners.
#
# The build is unsigned (no Apple Developer certificate), so users clear the
# Gatekeeper quarantine on first launch — see the README. To upgrade to a signed +
# notarized build later: add the secrets from docs/distribution.md, swap the build
# step for `./gradlew notarizeDmg …`, and re-add a cert-import step.

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build unsigned dmg (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            jdkArch: aarch64
          - arch: x86_64
            jdkArch: x64
    runs-on: macos-14 # Apple Silicon (reliable); x86_64 cross-builds here via Rosetta
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21 (${{ matrix.jdkArch }})
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          architecture: ${{ matrix.jdkArch }}

      - name: Install Rosetta (x86_64 cross-build only)
        if: matrix.arch == 'x86_64'
        run: sudo softwareupdate --install-rosetta --agree-to-license

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Derive version
        id: ver
        run: |
          version="${GITHUB_REF_NAME#v}"
          case "$version" in
            [0-9]*) ;;            # a real vX.Y.Z tag
            *) version="1.0.0" ;; # workflow_dispatch / non-version ref: just a test build
          esac
          echo "version=$version" >> "$GITHUB_OUTPUT"

      # The overlay's macOS helpers (window-locator, window-capture) are gitignored binaries,
      # so build them here (universal arm64+x86_64 via swiftc/lipo on the macos-14 runner) into
      # src/main/resources/native/macos/ so packageDmg bundles them into the app.
      - name: Build native helpers (universal)
        run: bash native/macos/build.sh

      # composeJdk points jpackage at this job's JDK, so the bundled runtime (and thus
      # the .app) matches the JDK architecture: aarch64 -> arm64, x64 (Rosetta) -> Intel.
      - name: Build dmg
        run: ./gradlew packageDmg -PpackageVersion=${{ steps.ver.outputs.version }} -PcomposeJdk="$JAVA_HOME" --stacktrace

      - name: Rename dmg per architecture & checksum
        id: dmg
        run: |
          src=$(find build/compose/binaries -name '*.dmg' | head -n1)
          if [ -z "$src" ]; then echo "No dmg produced" >&2; exit 1; fi
          out="FirstPick-${{ steps.ver.outputs.version }}-${{ matrix.arch }}.dmg"
          mv "$src" "$out"
          shasum -a 256 "$out" | tee "$out.sha256"
          echo "path=$out" >> "$GITHUB_OUTPUT"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dmg-${{ matrix.arch }}
          path: |
            ${{ steps.dmg.outputs.path }}
            ${{ steps.dmg.outputs.path }}.sha256
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    # Only publish for real tag pushes; workflow_dispatch runs are build-test only.
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all dmg artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
