name: Release

# Builds an UNSIGNED macOS .dmg for both Apple Silicon (arm64) and Intel (x86_64)
# when a vX.Y.Z tag is pushed, then publishes them to a GitHub Release.
#
# The build is unsigned (no Apple Developer certificate), so users clear the
# Gatekeeper quarantine on first launch — see the README. To upgrade to a signed +
# notarized build later: add the secrets from docs/distribution.md, then swap the
# "Build dmg" step for `./gradlew notarizeDmg …` and re-add a cert-import step.

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build unsigned dmg (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14   # Apple Silicon → arm64
            arch: arm64
          - runner: macos-13   # Intel → x86_64
            arch: x86_64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Derive version
        id: ver
        run: |
          version="${GITHUB_REF_NAME#v}"
          case "$version" in
            [0-9]*) ;;            # a real vX.Y.Z tag
            *) version="1.0.0" ;; # workflow_dispatch / non-version ref: just a test build
          esac
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Build dmg
        run: ./gradlew packageDmg -PpackageVersion=${{ steps.ver.outputs.version }} --stacktrace

      - name: Rename dmg per architecture & checksum
        id: dmg
        run: |
          src=$(find build/compose/binaries -name '*.dmg' | head -n1)
          if [ -z "$src" ]; then echo "No dmg produced" >&2; exit 1; fi
          out="FirstPick-${{ steps.ver.outputs.version }}-${{ matrix.arch }}.dmg"
          mv "$src" "$out"
          shasum -a 256 "$out" | tee "$out.sha256"
          echo "path=$out" >> "$GITHUB_OUTPUT"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dmg-${{ matrix.arch }}
          path: |
            ${{ steps.dmg.outputs.path }}
            ${{ steps.dmg.outputs.path }}.sha256
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    # Only publish for real tag pushes; workflow_dispatch runs are build-test only.
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all dmg artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
